<!DOCTYPE html>
<html>
<head>
    <title>To-Do List App</title>
</head>
<body>

    <h1>Welcome to My To-Do List App</h1>

    <p>
        Manage your tasks efficiently and stay organized with our simple to-do list application.
    </p>

    <hr>

    <h2>Add Task</h2>

    <form method="post">
        <label>Task:</label><br><br>
        <input type="text" name="task" placeholder="Enter your task"><br><br>
        
        <input type="submit" value="Add">
    </form>

    <hr>

    <h2>Task List</h2>

    <ul>
        <li>Sample Task 1</li>
        <li>Sample Task 2</li>
    </ul>

</body>
</html>
